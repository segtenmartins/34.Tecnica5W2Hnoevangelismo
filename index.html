:root {
  --primary: #0a2342;
  --primary-light: #1d4e89;
  --accent: #d4af37;
  --accent-light: #f4d35e;
  --white: #ffffff;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-600: #4b5563;
  --gray-800: #1f2937;
  --success: #10b981;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  --radius: 12px;
  --transition: all 0.3s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;line-height:1.6;color:var(--gray-800);background:var(--gray-50)}
.container{max-width:1200px;margin:0 auto;padding:0 1.5rem;display:flex;flex-direction:column}
h1,h2,h3{line-height:1.2;color:var(--primary)}
p{margin-bottom:1rem;color:var(--gray-600)}
section{padding:4rem 0}
.card{background:var(--white);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow);transition:var(--transition);border:1px solid var(--gray-100)}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
header{background:var(--white);box-shadow:var(--shadow);position:sticky;top:0;z-index:1000}
.header-content{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;flex-wrap:wrap;gap:1rem}
.logo{display:flex;align-items:center;gap:0.75rem;text-decoration:none;font-weight:700;font-size:1.25rem;color:var(--primary)}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent-light));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.hero{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:var(--white);padding:5rem 0 4rem;text-align:center;position:relative;overflow:hidden}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);color:var(--white);margin-bottom:1rem;font-weight:800}
.hero-subtitle{font-size:clamp(1.1rem,3vw,1.5rem);color:var(--accent-light);margin-bottom:2rem;max-width:700px;margin-left:auto;margin-right:auto}
.badge{display:inline-block;background:rgba(212,175,55,0.2);color:var(--accent-light);padding:0.5rem 1.25rem;border-radius:50px;font-weight:600;margin-bottom:1.5rem;border:1px solid var(--accent)}
.section-header{text-align:center;margin-bottom:3rem}
.section-header h2{font-size:clamp(1.75rem,4vw,2.5rem);margin-bottom:1rem}
.section-header p{font-size:1.125rem;max-width:700px;margin:0 auto}
.section-tag{display:inline-block;background:var(--accent-light);color:var(--primary);padding:0.25rem 0.75rem;border-radius:50px;font-size:0.875rem;font-weight:700;margin-bottom:1rem;text-transform:uppercase;letter-spacing:0.5px}
.method-card{cursor:pointer;position:relative;overflow:hidden}
.method-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--accent),var(--accent-light));transform:scaleY(0);transition:var(--transition)}
.method-card.active::before{transform:scaleY(1)}
.method-header{display:flex;align-items:center;gap:1rem;margin-bottom:0.75rem}
.method-letter{width:48px;height:48px;background:linear-gradient(135deg,var(--primary-light),var(--primary));color:var(--white);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.25rem;flex-shrink:0}
.method-content{max-height:none;overflow:visible;display:block;opacity:1;margin-top:1rem}
.method-tip{background:var(--gray-100);padding:1rem;border-radius:8px;margin:0.75rem 0;border-left:3px solid var(--accent)}
.method-example{background:var(--primary);color:var(--white);padding:1rem;border-radius:8px;margin-top:0.75rem}
.cards,.method-intro,.methodology-grid{display:flex !important;flex-direction:column !important;gap:1.5rem !important;width:100% !important}
.card,.method-card{width:100% !important;max-width:100% !important}
@media(max-width:768px){section{padding:2.5rem 0}.container{padding:0 1rem}}
`,ym=`
<section id="caso3-adventista" style="background: var(--gray-100); padding:4rem 0;">
  <div class="container">
    <div class="section-header">
      <span class="section-tag" style="background:#0a2342;color:#f4d35e;border:1px solid #d4af37;letter-spacing:0.6px;">CASO 3 DE 7 • NÍVEL AVANÇADO • LEI VS GRAÇA</span>
      <h2 style="margin-top:0.8rem;">O GUARDIÃO DO SÁBADO</h2>
      <p style="font-weight:700;color:var(--primary);font-size:1.2rem;max-width:720px;margin:0.8rem auto 1rem auto;">Como levar um adventista do descanso de um dia para o descanso de uma Pessoa</p>
      <div style="max-width:760px;margin:0 auto;text-align:left;background:white;border:2px solid #e5e7eb;border-radius:12px;padding:1.4rem 1.5rem;box-shadow:var(--shadow);">
        <p style="margin:0;font-size:1.02rem;line-height:1.7;color:#1f2937;"><strong>Este não é um debate de calendário. É uma conversa sobre segurança eterna.</strong> Marcos não precisa de um argumento melhor. Ele precisa de um descanso melhor.</p>
        <div style="margin-top:1rem;padding:1rem;background:#f9fafb;border-left:4px solid #d4af37;border-radius:8px;">
          <p style="margin:0;font-size:0.98rem;color:#4b5563;"><strong style="color:#0a2342;">TESE:</strong> A Lei exige descanso perfeito. A Graça oferece uma Pessoa perfeita que descansou por nós.</p>
          <p style="margin:0.4rem 0 0 0;font-size:0.9rem;color:#6b7280;font-weight:600;">Hb 4:9-11 — "Portanto, resta ainda um repouso para o povo de Deus... Procuremos, pois, entrar naquele descanso."</p>
        </div>
      </div>
    </div>

    <div class="cards" style="display:flex;flex-direction:column;gap:24px;">
      <div><h3 style="font-size:1.35rem;color:var(--primary);display:flex;align-items:center;gap:0.6rem;margin:0 0 1rem 0;"><span style="background:#0a2342;color:#d4af37;width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;">1</span> Perfil do Marcos, 38 anos</h3></div>

      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #0a2342;">
        <div class="method-header"><div class="method-letter" style="background:#0a2342;">M</div><div><h3 class="method-title" style="margin:0;">Quem é o Marcos</h3><small style="color:#6b7280;">Adventista de berço • Diácono • Conhece Daniel e Apocalipse</small></div></div>
        <div class="method-content"><div style="display:flex;flex-direction:column;gap:1rem;">
          <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:1.1rem;"><p style="margin:0 0 0.3rem 0;font-size:0.8rem;text-transform:uppercase;color:#0a2342;font-weight:800;">Quem é</p><p style="margin:0;font-size:1rem;line-height:1.6;color:#111827;">Adventista de berço, 3ª geração. Diácono, professor da Escola Sabatina, lidera desbravadores. Casado, 2 filhos. Conhece Daniel e Apocalipse com tabelas proféticas.</p></div>
          <div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1.1rem;"><p style="margin:0 0 0.3rem 0;font-size:0.8rem;text-transform:uppercase;color:#0a2342;font-weight:800;">O que acredita</p><ul style="margin:0;padding-left:1.2rem;color:#1f2937;line-height:1.7;font-size:0.98rem;"><li><strong>Sábado = selo de Deus</strong> (Ap 7, Ap 14:12)</li><li><strong>Juízo Investigativo desde 1844</strong> (Dn 8:14)</li><li><strong>Ellen White luz menor</strong> conduz à luz maior</li></ul></div>
          <div style="background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:1.1rem;"><p style="margin:0 0 0.3rem 0;font-size:0.8rem;text-transform:uppercase;color:#92400e;font-weight:800;">O que sente</p><ul style="margin:0;padding-left:1.2rem;color:#78350f;line-height:1.7;"><li>Ansiedade sábado à noite: "Guardei direito?"</li><li>Cansaço espiritual, medo de não ser suficiente</li><li>Medo do Juízo Investigativo</li></ul></div>
        </div></div>
      </div>

      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #d4af37;">
        <div class="method-header"><div class="method-letter" style="background:#d4af37;color:#0a2342;">✦</div><div><h3 class="method-title" style="margin:0;">Mapa de Crenças</h3><small style="color:#6b7280;">Versículos que ele usa: Êx 20:8-11, Is 66:23, Mt 5:17-19, Hb 4:9, Ap 14:12</small></div></div>
        <div class="method-content"><div style="display:flex;flex-direction:column;gap:0.7rem;">
          <div style="display:flex;gap:0.8rem;background:white;border:1px solid #e5e7eb;padding:0.9rem;border-radius:8px;"><span style="background:#0a2342;color:white;font-size:0.75rem;font-weight:800;padding:0.2rem 0.5rem;border-radius:4px;">Êx 20:8-11</span><span style="font-size:0.95rem;color:#374151;">Lembra-te do sábado — mandamento moral eterno</span></div>
          <div style="display:flex;gap:0.8rem;background:white;border:1px solid #e5e7eb;padding:0.9rem;border-radius:8px;"><span style="background:#0a2342;color:white;font-size:0.75rem;font-weight:800;padding:0.2rem 0.5rem;border-radius:4px;">Is 66:23</span><span style="font-size:0.95rem;color:#374151;">De um sábado a outro — guardará no céu</span></div>
          <div style="display:flex;gap:0.8rem;background:white;border:1px solid #e5e7eb;padding:0.9rem;border-radius:8px;"><span style="background:#0a2342;color:white;font-size:0.75rem;font-weight:800;padding:0.2rem 0.5rem;border-radius:4px;">Mt 5:17-19</span><span style="font-size:0.95rem;color:#374151;">Não vim abolir a lei</span></div>
          <div style="display:flex;gap:0.8rem;background:white;border:1px solid #e5e7eb;padding:0.9rem;border-radius:8px;"><span style="background:#0a2342;color:white;font-size:0.75rem;font-weight:800;padding:0.2rem 0.5rem;border-radius:4px;">Hb 4:9</span><span style="font-size:0.95rem;color:#374151;">Resta um repouso sabático</span></div>
          <div style="display:flex;gap:0.8rem;background:white;border:1px solid #e5e7eb;padding:0.9rem;border-radius:8px;"><span style="background:#0a2342;color:white;font-size:0.75rem;font-weight:800;padding:0.2rem 0.5rem;border-radius:4px;">Ap 14:12</span><span style="font-size:0.95rem;color:#374151;">Guardam os mandamentos — selo final</span></div>
        </div></div>
      </div>

      <div><h3 style="font-size:1.35rem;color:var(--primary);display:flex;align-items:center;gap:0.6rem;margin:0.8rem 0 1rem 0;"><span style="background:#ef4444;color:white;width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;">2</span> As 3 Armadilhas Fatais</h3></div>

      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #ef4444;background:linear-gradient(135deg,#fef2f2 0%,#fff 100%);"><div class="method-header"><div class="method-letter" style="background:#ef4444;">✕</div><div><h3 style="margin:0;color:#991b1b;">"Todo dia é sábado / calendário mudou"</h3><small style="color:#b91c1c;">Fecha o coração</small></div></div><div class="method-content"><p style="font-size:0.95rem;color:#7f1d1d;background:white;border:1px solid #fecaca;border-radius:10px;padding:1rem;"><strong>Por que falha:</strong> Ele tem resposta pronta sobre calendário juliano/gregoriano, 10 dias de 1582, ciclo semanal ininterrupto. Você parece despreparado.</p></div></div>
      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #ef4444;background:linear-gradient(135deg,#fef2f2 0%,#fff 100%);"><div class="method-header"><div class="method-letter" style="background:#ef4444;">✕</div><div><h3 style="margin:0;color:#991b1b;">"Domingo é o novo sábado"</h3><small style="color:#b91c1c;">Troca uma lei por outra</small></div></div><div class="method-content"><p style="font-size:0.95rem;color:#7f1d1d;background:white;border:1px solid #fecaca;border-radius:10px;padding:1rem;"><strong>Por que falha:</strong> Valida legalismo. Se selo é um dia, briga vira qual dia é certo. Você caiu na sombra. Cl 2:16-17 mostra que realidade é Cristo.</p></div></div>
      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #ef4444;background:linear-gradient(135deg,#fef2f2 0%,#fff 100%);"><div class="method-header"><div class="method-letter" style="background:#ef4444;">✕</div><div><h3 style="margin:0;color:#991b1b;">"Ellen White é falsa profetisa"</h3><small style="color:#b91c1c;">Ataca identidade</small></div></div><div class="method-content"><p style="font-size:0.95rem;color:#7f1d1d;background:white;border:1px solid #fecaca;border-radius:10px;padding:1rem;"><strong>Por que falha:</strong> Ataca família espiritual. Ele fecha, chama pastor, você vira perseguidor de Ap 12. Foque em Jesus, a luz menor apaga sozinha quando Cristo brilha.</p></div></div>

      <div><h3 style="font-size:1.35rem;color:var(--primary);display:flex;align-items:center;gap:0.6rem;margin:0.8rem 0 1rem 0;"><span style="background:#1d4e89;color:white;width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;">3</span> Estudo 5W2H Aplicado</h3></div>

      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #1d4e89;"><div class="method-header"><div class="method-letter" style="background:#1d4e89;">O QUÊ</div><div><h3 style="margin:0;">Sábado é memorial ou mandamento para salvação?</h3></div></div><div class="method-content"><div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:1.1rem;"><p style="margin:0;font-size:1.05rem;font-style:italic;color:#1e3a8a;">"Marcos, memorial aponta para algo maior que ele mesmo. Páscoa → Cordeiro. Sábado → Descanso. Se o Corpo chegou, por que abraçar só a sombra?"</p></div></div></div>
      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #d4af37;"><div class="method-header"><div class="method-letter" style="background:#d4af37;color:#0a2342;">COMO</div><div><h3 style="margin:0;">Você guarda perfeitamente?</h3></div></div><div class="method-content"><div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:1.1rem;"><p style="margin:0;font-size:1.05rem;font-style:italic;color:#78350f;">"Consegue guardar sem pecar em pensamento no sábado? Sem WhatsApp, sem iFood fazendo outro trabalhar? Tg 2:10 — tropeçou em um, culpado de todos."</p></div></div></div>
      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #7c3aed;"><div class="method-header"><div class="method-letter" style="background:#7c3aed;">POR QUÊ</div><div><h3 style="margin:0;">Guarda PARA ser salvo ou PORQUE é salvo?</h3></div></div><div class="method-content"><div style="background:#f5f3ff;border:1px solid #ddd6fe;border-radius:10px;padding:1.1rem;"><p style="margin:0;font-size:1rem;color:#4c1d95;">Ídolo é segurança e controle. Medo do Juízo Investigativo. Guarda PARA ser salvo (futuro incerto), não PORQUE foi salvo (passado garantido).</p></div></div></div>
      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #10b981;background:linear-gradient(135deg,#ecfdf5 0%,#fff 100%);"><div class="method-header"><div class="method-letter" style="background:#10b981;">QUEM</div><div><h3 style="margin:0;">Jesus é nosso Shabbath</h3></div></div><div class="method-content"><div style="display:flex;flex-direction:column;gap:0.8rem;"><div style="background:white;border:2px solid #0a2342;border-radius:10px;padding:1rem;"><strong>Mt 11:28</strong> — "Vinde a mim" — não "vinde ao sábado"</div><div style="background:white;border:1px solid #a7f3d0;border-radius:10px;padding:1rem;">Cl 2:16-17 — sombra vs corpo, realidade é Cristo</div><div style="background:white;border:1px solid #a7f3d0;border-radius:10px;padding:1rem;">Hb 4:10 — quem entrou no descanso descansou das suas obras</div></div></div></div>

      <div><h3 style="font-size:1.35rem;color:var(--primary);display:flex;align-items:center;gap:0.6rem;margin:0.8rem 0 1rem 0;"><span style="background:#d4af37;color:#0a2342;width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;">4</span> Roteiro de Ouro</h3></div>

      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #0a2342;"><div class="method-header"><div class="method-letter" style="background:#0a2342;">1</div><h3 style="margin:0;">Você tem paz COMPLETA hoje?</h3></div><div class="method-content"><div style="background:#fff;border:2px solid #0a2342;border-radius:10px;padding:1.2rem;"><p style="margin:0;font-size:1.1rem;font-style:italic;color:#111827;">"Você tem paz COMPLETA hoje se Jesus voltar, ou alívio temporário só no sábado de manhã?"</p></div></div></div>
      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #0a2342;"><div class="method-header"><div class="method-letter" style="background:#0a2342;">2</div><h3 style="margin:0;">Seu Salvador é o dia?</h3></div><div class="method-content"><div style="background:#fff;border:2px solid #0a2342;border-radius:10px;padding:1.2rem;"><p style="margin:0;font-size:1.1rem;font-style:italic;color:#111827;">"Se você falha mesmo guardando o sábado, ainda precisa de Salvador no sábado? Então seu Salvador não é o dia."</p></div></div></div>
      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #1d4e89;"><div class="method-header"><div class="method-letter" style="background:#1d4e89;">3</div><h3 style="margin:0;">Testemunho do Policial + Ef 1:13</h3></div><div class="method-content"><div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:1.2rem;"><p style="margin:0;font-size:1.05rem;font-style:italic;color:#1e3a8a;">"Fui policial 30 anos, nem sempre tive folga no sábado. Se o selo fosse um dia que nem sempre pude guardar, estaria perdido. Ef 1:13 diz que selo é o Espírito."</p></div></div></div>
      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #7c3aed;"><div class="method-header"><div class="method-letter" style="background:#7c3aed;">4</div><h3 style="margin:0;">Suficiência de Cristo</h3></div><div class="method-content"><div style="background:#f5f3ff;border:1px solid #ddd6fe;border-radius:10px;padding:1.2rem;"><p style="margin:0;font-size:1.1rem;font-style:italic;color:#4c1d95;">"Se Cristo é suficiente, por que a suficiência dEle não é suficiente pra te salvar sem seu esforço no sábado?"</p></div></div></div>
      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #10b981;background:linear-gradient(135deg,#ecfdf5 0%,#fff 100%);"><div class="method-header"><div class="method-letter" style="background:#10b981;">✓</div><div><h3 style="margin:0;">Checklist de postura</h3><small style="color:#059669;">Ouça 70%, chame de irmão, Bíblia física, ore no final</small></div></div><div class="method-content"><ul style="margin:0;padding-left:1.2rem;line-height:1.8;color:#065f46;"><li>Ouça 70% — deixe explicar Daniel 8</li><li>Chame de irmão, não adventista</li><li>Leve Bíblia física, abra junto</li><li>Ore no final: "Posso orar por você?"</li></ul></div></div>

      <div><h3 style="font-size:1.35rem;color:var(--primary);display:flex;align-items:center;gap:0.6rem;margin:0.8rem 0 1rem 0;"><span style="background:#0a2342;color:#f4d35e;width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;">5</span> Fechamento do Evangelho</h3></div>

      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #0a2342;background:linear-gradient(135deg,#0a2342 0%,#1d4e89 100%);color:white;">
        <div class="method-header"><div class="method-letter" style="background:#d4af37;color:#0a2342;">❝</div><div><h3 style="margin:0;color:#f4d35e;">Declaração</h3></div></div>
        <div class="method-content"><div style="background:rgba(255,255,255,0.08);border:1px solid rgba(212,175,55,0.3);border-radius:12px;padding:1.6rem;text-align:center;"><p style="margin:0;font-size:1.35rem;font-style:italic;font-weight:600;color:#fff;">"Eu não guardo para ser salvo, mas porque sou salvo.<br/>Meu descanso não é um dia.<br/>Meu descanso é uma Pessoa: Jesus."</p></div>
        <div style="margin-top:1rem;display:flex;flex-direction:column;gap:0.8rem;">
          <div style="background:white;border-radius:10px;padding:1rem;"><strong style="color:#0a2342;">Jo 19:30 Tetelestai</strong><p style="margin:0;color:#4b5563;">Está consumado — descansou porque obra acabou</p></div>
          <div style="background:white;border-radius:10px;padding:1rem;"><strong style="color:#0a2342;">Rm 8:1 Nenhuma condenação</strong><p style="margin:0;color:#4b5563;">Não há Juízo pendente para quem está em Cristo</p></div>
          <div style="background:white;border-radius:10px;padding:1rem;"><strong style="color:#0a2342;">Mt 11:28 Vinde a mim</strong><p style="margin:0;color:#4b5563;">Sábado dá folga. Jesus dá descanso da alma</p></div>
        </div></div>
      </div>

      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #d4af37;"><div class="method-header"><div class="method-letter" style="background:#d4af37;color:#0a2342;">✝️</div><div><h3 style="margin:0;">Como fechar com Marcos</h3></div></div><div class="method-content"><div style="background:#fff;border:2px solid #0a2342;border-radius:12px;padding:1.4rem;"><p style="margin:0;font-size:1.15rem;font-style:italic;color:#111827;">"Marcos, se hoje seu coração parasse e Deus perguntasse por que devo te deixar entrar, o que você diria? Porque guardei o sábado ou porque Jesus guardou tudo por mim? O sábado era a sombra. Cristo é o corpo."</p></div></div></div>

      <div class="card method-card active" style="width:100%;max-width:100%;border-left:5px solid #10b981;background:linear-gradient(135deg,#f0fdf4 0%,#fff 100%);"><div class="method-header"><div class="method-letter" style="background:#10b981;">\uD83C\uDFAF</div><div><h3 style="margin:0;color:#065f46;">A missão não é provar que o sábado acabou. É provar que Jesus é melhor que o sábado.</h3></div></div><div class="method-content"><p style="text-align:center;color:#4b5563;">Quando Jesus fica grande, o dia fica pequeno. Leve Marcos do descanso de um dia para o descanso de uma Pessoa.</p></div></div>
    </div>

    <div style="margin-top:2.5rem;text-align:center;padding:1.5rem;background:white;border-radius:12px;border:1px solid #e5e7eb;"><p style="margin:0;font-size:0.9rem;color:#6b7280;"><strong style="color:#0a2342;">Lembre-se:</strong> Marcos não é adversário, é irmão cansado. Mostre que já é amado de graça.<br/><em style="color:#1d4e89;">"Vinde a mim... e eu vos aliviarei" — Mt 11:28</em></p></div>
  </div>
</section>
